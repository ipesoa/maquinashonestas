<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- ============ SEO ============ -->
<title>máquinashonestas — noticias de IA y tecnología</title>
<meta name="description" content="máquinashonestas: noticias del mundo de la inteligencia artificial y la tecnología, contadas claras y sin humo.">
<meta name="keywords" content="inteligencia artificial, IA, tecnología, noticias, mundo IA">
<meta name="author" content="máquinashonestas">
<meta name="robots" content="index, follow">
<link rel="canonical" href="https://TUUSUARIO.github.io/maquinashonestas/">

<!-- Open Graph / redes -->
<meta property="og:type" content="website">
<meta property="og:title" content="máquinashonestas — noticias de IA y tecnología">
<meta property="og:description" content="Noticias del mundo de la inteligencia artificial y la tecnología, contadas claras y sin humo.">
<meta property="og:url" content="https://TUUSUARIO.github.io/maquinashonestas/">
<meta property="og:locale" content="es_ES">
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="máquinashonestas">
<meta name="twitter:description" content="Noticias de IA y tecnología, sin humo.">

<!-- Los datos estructurados (JSON-LD) se generan automáticamente
     a partir de posts.json al cargar la página -->

<!-- Tipografía consola -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,400;0,700;0,800;1,400&display=swap" rel="stylesheet">

<style>
/* ==========================================================
   máquinashonestas — hoja de estilos
   Paleta:  blanco #ffffff · tinta #1c1c1c · verde #00e414
            azul #145cf2 · gris tarjeta #d2d2d2
   ========================================================== */
:root{
  --ink:#1c1c1c;
  --paper:#ffffff;
  --green:#00e414;
  --blue:#145cf2;
  --card:#d2d2d2;
  --card-open:#c6c6c6;
  --pill-r:999px;
  --radius:26px;
  --border:6px;
  --pad:20px;
  --maxw:720px;
  font-size:16px;
}
@media (min-width:900px){
  :root{ --maxw:820px; --pad:28px; }
}

*{ box-sizing:border-box; margin:0; padding:0; }

html{ scroll-behavior:smooth; }

body{
  font-family:"JetBrains Mono", ui-monospace, "Cascadia Mono", Consolas, monospace;
  background:var(--paper);
  color:var(--ink);
  padding:14px 14px 80px;
  -webkit-font-smoothing:antialiased;
}

.wrap{
  max-width:var(--maxw);
  margin:0 auto;
  display:flex;
  flex-direction:column;
  gap:22px;
}

/* ---------- CABECERA (descuadrada a propósito) ---------- */
.masthead{
  border:var(--border) solid var(--green);
  background:var(--paper);
  padding:52px var(--pad) 26px;
  cursor:pointer;
  user-select:none;
  transform:rotate(-0.6deg) translateX(-4px);   /* el único elemento torcido */
  transition:transform .35s cubic-bezier(.2,1.4,.4,1);
  -webkit-tap-highlight-color:transparent;
}
.masthead:hover{ transform:rotate(0.4deg) translateX(2px); }
.masthead:active{ transform:rotate(0deg) scale(.985); }
.masthead h1{
  font-size:clamp(1.7rem, 8.5vw, 4rem);
  font-weight:400;
  letter-spacing:-0.04em;
  text-align:right;
  white-space:nowrap;
  line-height:1;
}
.masthead h1::after{
  content:"_";
  animation:blink 1.1s steps(1) infinite;
  color:var(--green);
  font-weight:700;
}
@keyframes blink{ 50%{ opacity:0; } }

/* ---------- ETIQUETAS (aleatorias en cada carga) ---------- */
.tags{
  display:flex;
  flex-wrap:wrap;
  gap:12px 14px;
  justify-content:space-between;
}
.tag{
  font-family:inherit;
  font-size:.95rem;
  border:5px solid var(--blue);
  border-radius:var(--pill-r);
  background:var(--paper);
  color:var(--ink);
  padding:10px 22px;
  cursor:pointer;
  flex:1 1 auto;
  min-width:110px;
  text-align:center;
  transition:background .2s ease, color .2s ease, transform .15s ease;
  animation:tagIn .45s cubic-bezier(.2,1.2,.3,1) backwards;
}
.tag:nth-child(2){ animation-delay:.06s; }
.tag:nth-child(3){ animation-delay:.12s; }
.tag:nth-child(4){ animation-delay:.18s; }
@keyframes tagIn{
  from{ opacity:0; transform:translateY(8px) scale(.9); }
  to{ opacity:1; transform:none; }
}
.tag:hover{ transform:translateY(-2px); }
.tag[aria-pressed="true"]{
  background:var(--blue);
  color:var(--paper);
}

/* ---------- BUSCADOR ---------- */
.searchbox{ position:relative; }
.searchbox input{
  width:100%;
  font-family:inherit;
  font-size:1.1rem;
  color:var(--ink);
  border:6px solid var(--blue);
  border-radius:var(--pill-r);
  background:var(--paper);
  padding:14px 26px;
  outline:none;
}
.searchbox input:focus{ border-color:var(--ink); }
/* "buscar..." con puntos que se mueven, desaparece al escribir o enfocar */
.search-ghost{
  position:absolute;
  left:32px; top:50%;
  transform:translateY(-50%);
  font-size:1.1rem;
  color:var(--ink);
  pointer-events:none;
  opacity:.9;
  transition:opacity .2s ease;
}
.searchbox input:focus ~ .search-ghost,
.searchbox input:not(:placeholder-shown) ~ .search-ghost{ opacity:0; }
.search-ghost .dot{
  display:inline-block;
  animation:hop 1.4s ease-in-out infinite;
}
.search-ghost .dot:nth-child(2){ animation-delay:.18s; }
.search-ghost .dot:nth-child(3){ animation-delay:.36s; }
@keyframes hop{
  0%,60%,100%{ transform:translateY(0); opacity:.35; }
  30%{ transform:translateY(-5px); opacity:1; }
}

/* ---------- NOTICIAS ---------- */
.feed{
  display:flex;
  flex-direction:column;
  gap:26px;
  list-style:none;
}
.news{
  background:var(--card);
  border-radius:var(--radius);
  padding:calc(var(--pad) + 4px) var(--pad) var(--pad);
  transition:background .4s ease, box-shadow .4s ease, transform .4s cubic-bezier(.2,1,.3,1);
}
.news.hidden{ display:none; }
.news.open{
  background:var(--card-open);
  box-shadow:0 14px 40px rgba(0,0,0,.18);
  transform:scale(1.015);
}

.news-head{
  width:100%;
  display:flex;
  justify-content:space-between;
  align-items:baseline;
  gap:16px;
  background:none;
  border:none;
  font-family:inherit;
  color:inherit;
  text-align:left;
  cursor:pointer;
  padding:0;
}
.news-head h2{
  font-size:1.35rem;
  font-weight:800;
  letter-spacing:.02em;
  text-transform:uppercase;
}
.news-head time{
  font-size:1rem;
  white-space:nowrap;
}

.news-summary{
  margin-top:10px;
  font-size:1.15rem;
  line-height:1.5;
  cursor:pointer;
}

/* cuerpo del artículo: cerrado por defecto, se despliega con animación.
   El texto SIEMPRE está en el DOM → Google lo lee aunque esté plegado. */
.news-body{
  display:grid;
  grid-template-rows:0fr;
  transition:grid-template-rows .55s cubic-bezier(.25,1,.3,1);
}
.news.open .news-body{ grid-template-rows:1fr; }
.news-body > div{
  overflow:hidden;
  min-height:0;
}
.news-body p{
  margin-top:18px;
  font-size:1.05rem;
  line-height:1.65;
}
.news-body p:first-child{
  margin-top:22px;
  padding-top:18px;
  border-top:3px dashed rgba(0,0,0,.25);
}
.source-row{ margin-top:22px !important; }
.news-source{
  display:inline-block;
  border:4px solid var(--blue);
  border-radius:var(--pill-r);
  color:var(--ink);
  background:var(--paper);
  font-weight:800;
  padding:10px 18px;
  text-decoration:none;
  transition:background .2s ease, color .2s ease, transform .15s ease;
}
.news-source:hover{ background:var(--blue); color:var(--paper); transform:translateY(-2px); }


.news-tags{
  display:flex;
  flex-wrap:wrap;
  gap:14px;
  margin-top:22px;
}
.news-tag{
  border:5px solid var(--blue);
  border-radius:var(--pill-r);
  background:transparent;
  color:var(--ink);
  font-family:inherit;
  font-size:.9rem;
  padding:8px 26px;
  cursor:pointer;
  transition:background .2s ease, color .2s ease;
}
.news-tag:hover{ background:var(--blue); color:var(--paper); }

/* mensaje si el filtro no encuentra nada / error de carga */
.empty{
  display:none;
  text-align:center;
  padding:30px;
  font-size:1.05rem;
  opacity:.7;
}
.empty.show{ display:block; }

/* pie */
footer{
  margin-top:40px;
  text-align:center;
  font-size:.85rem;
  opacity:.55;
}

/* accesibilidad */
:focus-visible{ outline:4px solid var(--green); outline-offset:3px; }
@media (prefers-reduced-motion:reduce){
  *, *::before, *::after{ animation:none !important; transition:none !important; }
  html{ scroll-behavior:auto; }
}
</style>
</head>
<body>
<div class="wrap">

  <!-- Cabecera: al pinchar recarga la página (actualiza) -->
  <header class="masthead" id="masthead" role="button" tabindex="0"
          aria-label="máquinashonestas — pincha para actualizar">
    <h1>máquinashonestas</h1>
  </header>

  <!-- Etiquetas: se eligen al azar en cada carga a partir de posts.json -->
  <nav class="tags" id="tags" aria-label="Filtrar por etiqueta"></nav>

  <!-- Buscador -->
  <div class="searchbox">
    <input id="search" type="search" placeholder=" " autocomplete="off"
           aria-label="Buscar noticias">
    <span class="search-ghost" aria-hidden="true">buscar<span class="dot">.</span><span class="dot">.</span><span class="dot">.</span></span>
  </div>

  <!-- Las noticias se cargan desde posts.json -->
  <main>
    <ul class="feed" id="feed"></ul>
    <p class="empty" id="empty">nada por aquí_</p>
  </main>

  <footer>© máquinashonestas · noticias de ia y tecnología</footer>
</div>

<script>
/* ============================================================
   máquinashonestas — carga de posts.json + interacción
   Estructura esperada de cada post (ver posts.json):
   {
     "id":       "slug-unico",
     "titulo":   "Titular",
     "fecha":    "AAAA-MM-DD",
     "resumen":  "Una o dos frases.",
     "cuerpo":   ["párrafo 1", "párrafo 2", ...],
     "etiquetas":["ia", "tecnología"]
   }
   ============================================================ */

const NUM_TAGS = 4;            // píldoras aleatorias que se muestran
const feed   = document.getElementById('feed');
const tagRow = document.getElementById('tags');
const empty  = document.getElementById('empty');
const searchInput = document.getElementById('search');
let cards = [];
let activeTag = null;

/* cabecera: pincha → actualiza (sin caché, para traer posts nuevos) */
const masthead = document.getElementById('masthead');
masthead.addEventListener('click', () => location.reload());
masthead.addEventListener('keydown', e => {
  if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); location.reload(); }
});

/* ---------- utilidades ---------- */
function fmtFecha(iso){
  const [a, m, d] = iso.split('-');
  return `${d}/${m}/${a}`;
}
function shuffle(arr){
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function el(tag, cls, text){
  const n = document.createElement(tag);
  if (cls) n.className = cls;
  if (text != null) n.textContent = text;
  return n;
}

/* ---------- render de un post ---------- */
function renderPost(post){
  const li = el('li', 'news');
  li.dataset.tags = post.etiquetas.join(' ');
  li.id = post.id;

  const article = document.createElement('article');

  const head = el('button', 'news-head');
  head.setAttribute('aria-expanded', 'false');
  const h2 = el('h2', null, post.titulo);
  const time = document.createElement('time');
  time.dateTime = post.fecha;
  time.textContent = fmtFecha(post.fecha);
  head.append(h2, time);

  const summary = el('p', 'news-summary', post.resumen);

  const body = el('div', 'news-body');
  const inner = document.createElement('div');
  const articleBody = document.createElement('div');
  post.cuerpo.forEach(parr => {
    const value = String(parr);
    const source = value.match(/^(Abrir repositorio|Ver nota oficial|Consultar fuente original):\s*(https?:\/\/\S+)$/i);
    if (!source){
      articleBody.append(el('p', null, value));
      return;
    }
    const row = el('p', 'source-row');
    const link = el('a', 'news-source', source[1] + ' ↗');
    link.href = source[2];
    link.target = '_blank';
    link.rel = 'noopener noreferrer';
    row.append(link);
    articleBody.append(row);
  });

  const tags = el('div', 'news-tags');
  post.etiquetas.forEach(t => {
    const b = el('button', 'news-tag', t);
    b.dataset.tag = t;
    b.addEventListener('click', e => {
      e.stopPropagation();
      setActiveTag(t);
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });
    tags.append(b);
  });

  inner.append(articleBody, tags);
  body.append(inner);
  article.append(head, summary, body);
  li.append(article);

  const toggle = () => li.classList.contains('open') ? closeCard(li) : openCard(li);
  head.addEventListener('click', toggle);
  summary.addEventListener('click', toggle);

  return li;
}

/* ---------- acordeón ---------- */
function closeCard(card){
  card.classList.remove('open');
  card.querySelector('.news-head').setAttribute('aria-expanded', 'false');
}
function openCard(card){
  cards.forEach(c => { if (c !== card) closeCard(c); });
  card.classList.add('open');
  card.querySelector('.news-head').setAttribute('aria-expanded', 'true');
  history.replaceState(null, '', '#' + card.id);   /* enlace compartible */
  setTimeout(() => card.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 300);
}

/* ---------- etiquetas aleatorias ---------- */
function renderRandomTags(posts){
  const todas = [...new Set(posts.flatMap(p => p.etiquetas))];
  const elegidas = shuffle(todas).slice(0, NUM_TAGS);
  tagRow.innerHTML = '';
  elegidas.forEach(t => {
    const b = el('button', 'tag', t);
    b.dataset.tag = t;
    b.setAttribute('aria-pressed', 'false');
    b.addEventListener('click', () => setActiveTag(activeTag === t ? null : t));
    tagRow.append(b);
  });
}
function setActiveTag(tag){
  activeTag = tag;
  tagRow.querySelectorAll('.tag').forEach(b =>
    b.setAttribute('aria-pressed', String(b.dataset.tag === activeTag)));
  applyFilters();
}

/* ---------- filtros (etiqueta + búsqueda) ---------- */
function applyFilters(){
  const q = searchInput.value.trim().toLowerCase();
  let visible = 0;
  cards.forEach(card => {
    const okTag = !activeTag || card.dataset.tags.toLowerCase().split(' ').includes(activeTag);
    const okSearch = !q || card.textContent.toLowerCase().includes(q);
    const show = okTag && okSearch;
    card.classList.toggle('hidden', !show);
    if (!show) closeCard(card);
    if (show) visible++;
  });
  empty.textContent = 'nada por aquí_';
  empty.classList.toggle('show', visible === 0);
}
searchInput.addEventListener('input', applyFilters);

/* ---------- SEO: JSON-LD generado desde los posts ---------- */
function injectJsonLd(posts){
  const base = document.querySelector('link[rel="canonical"]').href;
  const data = {
    "@context": "https://schema.org",
    "@type": "Blog",
    "name": "máquinashonestas",
    "url": base,
    "description": "Noticias del mundo de la inteligencia artificial y la tecnología.",
    "inLanguage": "es",
    "blogPost": posts.map(p => ({
      "@type": "BlogPosting",
      "headline": p.titulo,
      "datePublished": p.fecha,
      "description": p.resumen,
      "articleBody": p.cuerpo.join(" "),
      "keywords": p.etiquetas.join(", "),
      "url": base + "#" + p.id,
      "inLanguage": "es"
    }))
  };
  const s = document.createElement('script');
  s.type = 'application/ld+json';
  s.textContent = JSON.stringify(data);
  document.head.append(s);
}

/* ---------- arranque ---------- */
async function init(){
  try{
    const res = await fetch('posts.json', { cache: 'no-store' });
    if (!res.ok) throw new Error(res.status);
    const data = await res.json();

    /* más recientes primero */
    const posts = [...data.posts].sort((a, b) => b.fecha.localeCompare(a.fecha));

    renderRandomTags(posts);
    feed.innerHTML = '';
    cards = posts.map(p => {
      const card = renderPost(p);
      feed.append(card);
      return card;
    });
    injectJsonLd(posts);

    /* si la URL trae #slug, abre esa noticia */
    const slug = location.hash.slice(1);
    if (slug){
      const target = document.getElementById(slug);
      if (target) openCard(target);
    }
  }catch(err){
    empty.textContent = 'no se pudo cargar posts.json_ (si estás en local, sirve la carpeta con un servidor)';
    empty.classList.add('show');
    console.error('máquinashonestas:', err);
  }
}
init();
</script>
</body>
</html>
